
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#09090F;--surface:#111120;--raised:#18182A;
  --border:#22223A;--border-h:#33334A;
  --amber:#C4A85A;--amber-bg:rgba(196,168,90,0.10);--amber-border:rgba(196,168,90,0.35);
  --violet:#9B7FD4;--violet-bg:rgba(155,127,212,0.12);--violet-border:rgba(155,127,212,0.35);
  --red:#EF4444;--red-bg:rgba(239,68,68,0.10);--red-border:rgba(239,68,68,0.35);
  --green:#4ADE80;--green-bg:rgba(74,222,128,0.10);--green-border:rgba(74,222,128,0.3);
  --text:#E8E4F0;--text-sec:#9890A8;--text-muted:#4A4560;
}
body{background:var(--bg);font-family:'JetBrains Mono','Fira Mono',monospace;min-height:520px;display:flex;align-items:center;justify-content:center;padding:24px}

.stage{width:100%;max-width:420px;display:flex;flex-direction:column;gap:0}

.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:36px 32px;width:100%;position:relative;overflow:hidden}

.brand{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:32px}
.brand-text{font-size:18px;letter-spacing:0.16em;color:var(--text);text-transform:uppercase;font-family:'Georgia',serif}

.step-label{font-size:10px;letter-spacing:0.18em;color:var(--text-muted);text-transform:uppercase;text-align:center;margin-bottom:20px}
.step-title{font-size:20px;font-family:'Georgia',serif;color:var(--text);text-align:center;margin-bottom:8px;font-weight:400}
.step-sub{font-size:12px;color:var(--text-sec);text-align:center;margin-bottom:28px;line-height:1.6}

/* ── WALLET LIST ── */
.wallet-list{display:flex;flex-direction:column;gap:8px}
.wallet-opt{display:flex;align-items:center;gap:12px;padding:13px 16px;background:var(--raised);border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:border-color .2s,background .2s;width:100%}
.wallet-opt:hover{border-color:var(--amber-border);background:var(--amber-bg)}
.wallet-opt-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px;background:var(--border)}
.wallet-opt-info{text-align:left}
.wallet-opt-name{font-size:13px;color:var(--text);letter-spacing:.03em}
.wallet-opt-type{font-size:10px;color:var(--text-muted);margin-top:2px}
.wallet-opt-arrow{margin-left:auto;color:var(--text-muted);font-size:14px}

/* ── SIGNING STATE ── */
.signing-wrap{display:flex;flex-direction:column;align-items:center;gap:20px;padding:8px 0 4px}
.signing-orbit{position:relative;width:80px;height:80px}
.orbit-ring{position:absolute;inset:0;border-radius:50%;border:1.5px solid transparent}
.orbit-ring.r1{border-top-color:var(--amber);border-right-color:var(--amber);animation:spin 1.2s linear infinite}
.orbit-ring.r2{inset:10px;border-bottom-color:var(--violet);border-left-color:var(--violet);animation:spin 1.8s linear infinite reverse}
.orbit-core{position:absolute;inset:22px;border-radius:50%;background:var(--raised);border:1px solid var(--border);display:flex;align-items:center;justify-content:center}
@keyframes spin{to{transform:rotate(360deg)}}
.signing-msg{font-size:12px;color:var(--text-sec);text-align:center;line-height:1.6}
.signing-hash{font-size:10px;color:var(--text-muted);background:var(--raised);border:1px solid var(--border);border-radius:6px;padding:8px 12px;letter-spacing:.04em;word-break:break-all;line-height:1.7;margin-top:4px;text-align:left}
.signing-hash span{color:var(--amber)}

/* ── INVITE INPUT ── */
.invite-wrap{display:flex;flex-direction:column;gap:12px}
.code-input-wrap{position:relative}
.code-input{width:100%;padding:14px 16px;background:var(--raised);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:.22em;text-align:center;text-transform:uppercase;outline:none;transition:border-color .2s,box-shadow .2s}
.code-input::placeholder{color:var(--text-muted);letter-spacing:.08em;font-size:14px}
.code-input:focus{border-color:var(--violet-border);box-shadow:0 0 0 3px rgba(155,127,212,.12)}
.code-input.err{border-color:var(--red-border);box-shadow:0 0 0 3px rgba(239,68,68,.10);animation:shake .35s ease}
.code-input.ok{border-color:var(--green-border);box-shadow:0 0 0 3px rgba(74,222,128,.10)}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}

.hint{font-size:11px;color:var(--text-muted);text-align:center}
.hint a{color:var(--violet);cursor:pointer;text-decoration:none}
.hint a:hover{text-decoration:underline}

.feedback{padding:10px 14px;border-radius:8px;font-size:12px;line-height:1.5;display:none}
.feedback.err{display:flex;background:var(--red-bg);border:1px solid var(--red-border);color:#FDA4A4;gap:8px;align-items:flex-start}
.feedback.ok{display:flex;background:var(--green-bg);border:1px solid var(--green-border);color:#86EFAC;gap:8px;align-items:center}
.feedback-icon{flex-shrink:0;margin-top:1px}

/* ── VERIFY ANIMATION ── */
.verifying-wrap{display:flex;flex-direction:column;align-items:center;gap:16px}
.vbar-track{width:100%;height:3px;background:var(--border);border-radius:999px;overflow:hidden}
.vbar-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--amber),var(--violet));width:0%;transition:width .08s linear}
.vstatus{font-size:11px;color:var(--text-sec);text-align:center;letter-spacing:.06em}

/* ── SUCCESS ── */
.success-wrap{display:flex;flex-direction:column;align-items:center;gap:16px}
.success-badge{width:64px;height:64px;border-radius:50%;background:var(--green-bg);border:1px solid var(--green-border);display:flex;align-items:center;justify-content:center}
.success-address{font-size:11px;color:var(--text-muted);background:var(--raised);border:1px solid var(--border);border-radius:6px;padding:8px 14px;letter-spacing:.05em}

/* ── BUTTONS ── */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px;border-radius:10px;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:.06em;cursor:pointer;transition:all .2s;border:1px solid}
.btn-primary{background:var(--amber-bg);border-color:var(--amber-border);color:var(--amber)}
.btn-primary:hover{background:rgba(196,168,90,.2)}
.btn-ghost{background:transparent;border-color:var(--border);color:var(--text-sec)}
.btn-ghost:hover{border-color:var(--border-h);color:var(--text)}
.btn-violet{background:var(--violet-bg);border-color:var(--violet-border);color:var(--violet)}
.btn-violet:hover{background:rgba(155,127,212,.2)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-sm{padding:9px;font-size:11px;width:auto;padding:8px 16px}

.divider{height:1px;background:var(--border);margin:20px 0}
.actions{display:flex;flex-direction:column;gap:8px;margin-top:4px}

.dot-pulse{display:inline-flex;gap:4px;align-items:center}
.dot-pulse span{width:5px;height:5px;border-radius:50%;background:currentColor;animation:dp .9s ease-in-out infinite}
.dot-pulse span:nth-child(2){animation-delay:.18s}
.dot-pulse span:nth-child(3){animation-delay:.36s}
@keyframes dp{0%,80%,100%{transform:scale(.6);opacity:.5}40%{transform:scale(1);opacity:1}}

.back-row{display:flex;align-items:center;justify-content:center;margin-top:16px}
.back-btn{background:none;border:none;color:var(--text-muted);font-size:11px;cursor:pointer;letter-spacing:.06em;font-family:inherit}
.back-btn:hover{color:var(--text-sec)}

.step-dots{display:flex;gap:6px;justify-content:center;margin-bottom:24px}
.step-dot{width:6px;height:6px;border-radius:50%;background:var(--border);transition:background .3s}
.step-dot.active{background:var(--amber)}
.step-dot.done{background:var(--violet)}

.flare-pulse{animation:fp 2.5s ease-in-out infinite}
@keyframes fp{0%,100%{opacity:1}50%{opacity:.6}}
</style>

<div class="stage" id="stage">
  <div class="card" id="main-card">
    <div class="brand">
      <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
        <circle cx="16" cy="22" r="3" fill="#C4A85A"/>
        <path d="M8 18 Q16 8 24 18" stroke="#C4A85A" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.5"/>
        <path d="M4 15 Q16 2 28 15" stroke="#C4A85A" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.25"/>
        <path d="M10 21 Q16 12 22 21" stroke="#9B7FD4" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.7"/>
      </svg>
      <span class="brand-text">Semaphore</span>
    </div>

    <div id="content"></div>
  </div>
</div>

<script>
const VALID_CODES = ['ALPHA-7F3K', 'FLARE-9X2M', 'WAVE-4TZ8', 'BEACON-1A'];
let currentWallet = null;
let attempts = 0;

const views = {

  connect: () => `
    <div class="step-dots"><div class="step-dot active"></div><div class="step-dot"></div><div class="step-dot"></div></div>
    <div class="step-label">Step 1 of 3 · Authentication</div>
    <div class="step-title">Connect your wallet</div>
    <div class="step-sub">Semaphore uses your wallet as identity.<br>No password. No email. Just your keys.</div>
    <div class="wallet-list">
      <button class="wallet-opt" onclick="selectWallet('MetaMask','0x742d35Cc6634C0532925a3b8D4C9B2D4e123456A')">
        <div class="wallet-opt-icon">🦊</div>
        <div class="wallet-opt-info">
          <div class="wallet-opt-name">MetaMask</div>
          <div class="wallet-opt-type">Browser extension</div>
        </div>
        <span class="wallet-opt-arrow">›</span>
      </button>
      <button class="wallet-opt" onclick="selectWallet('WalletConnect','0x9B2D4e123456789B2D4e123456789B2D4e123456')">
        <div class="wallet-opt-icon">🔗</div>
        <div class="wallet-opt-info">
          <div class="wallet-opt-name">WalletConnect</div>
          <div class="wallet-opt-type">Mobile & hardware</div>
        </div>
        <span class="wallet-opt-arrow">›</span>
      </button>
      <button class="wallet-opt" onclick="selectWallet('Coinbase','0x1A2B3C4D5E6F7A8B9C0D1E2F3A4B5C6D7E8F9A0B')">
        <div class="wallet-opt-icon">🔵</div>
        <div class="wallet-opt-info">
          <div class="wallet-opt-name">Coinbase Wallet</div>
          <div class="wallet-opt-type">Smart wallet</div>
        </div>
        <span class="wallet-opt-arrow">›</span>
      </button>
    </div>
    <div class="divider"></div>
    <div class="hint">By connecting you agree to sign a<br>non-transferable authentication message.</div>
  `,

  signing: (name, addr) => `
    <div class="step-dots"><div class="step-dot done"></div><div class="step-dot active"></div><div class="step-dot"></div></div>
    <div class="step-label">Step 2 of 3 · Signature</div>
    <div class="step-title">Confirm in ${name}</div>
    <div class="step-sub">Sign the message below to prove<br>ownership of this address.</div>
    <div class="signing-wrap">
      <div class="signing-orbit">
        <div class="orbit-ring r1"></div>
        <div class="orbit-ring r2"></div>
        <div class="orbit-core">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="#C4A85A">
            <path d="M12 2L9.5 9.5L2 12L9.5 14.5L12 22L14.5 14.5L22 12L14.5 9.5L12 2Z" opacity=".9"/>
          </svg>
        </div>
      </div>
      <div class="signing-msg">
        Waiting for signature<br>
        <div class="dot-pulse" style="color:var(--text-muted);margin-top:4px;justify-content:center">
          <span></span><span></span><span></span>
        </div>
      </div>
      <div class="signing-hash">
        <div style="font-size:9px;color:var(--text-muted);margin-bottom:6px;letter-spacing:.12em">MESSAGE TO SIGN</div>
        <span style="color:var(--text-sec)">Semaphore Authentication</span><br>
        Nonce: <span>0x${Math.random().toString(16).slice(2,10).toUpperCase()}</span><br>
        Address: <span>${addr.slice(0,10)}...${addr.slice(-6)}</span><br>
        Timestamp: <span>${new Date().toISOString().slice(0,19)}Z</span>
      </div>
    </div>
    <div class="actions" style="margin-top:20px">
      <button class="btn btn-ghost" onclick="render('connect')">← Choose different wallet</button>
    </div>
  `,

  invite: (addr) => `
    <div class="step-dots"><div class="step-dot done"></div><div class="step-dot done"></div><div class="step-dot active"></div></div>
    <div class="step-label">Step 3 of 3 · Access</div>
    <div class="step-title">Enter invite code</div>
    <div class="step-sub">Semaphore is invite-only.<br>Each code grants one wallet access to the network.</div>
    <div class="invite-wrap">
      <div class="code-input-wrap">
        <input class="code-input" id="code-input" maxlength="12" placeholder="XXXX-XXXX"
          oninput="handleInput(this)" onkeydown="if(event.key==='Enter')submitCode()"/>
      </div>
      <div class="feedback" id="feedback"></div>
      <button class="btn btn-violet" onclick="submitCode()" id="verify-btn">
        Verify access code
      </button>
      <div class="hint">
        No code? <a onclick="showRequestFlow()">Request an invite</a> from an existing member.
      </div>
    </div>
    <div class="back-row">
      <button class="back-btn" onclick="render('connect')">← Start over</button>
    </div>
  `,

  verifying: () => `
    <div class="step-dots"><div class="step-dot done"></div><div class="step-dot done"></div><div class="step-dot done"></div></div>
    <div class="step-label">Verifying on-chain</div>
    <div class="step-title">Checking the registry</div>
    <div class="step-sub">Querying the Semaphore invite contract<br>on Ethereum mainnet.</div>
    <div class="verifying-wrap">
      <div class="vbar-track" style="width:100%"><div class="vbar-fill" id="vbar"></div></div>
      <div class="vstatus" id="vstatus">Connecting to node...</div>
    </div>
  `,

  success: (addr) => `
    <div class="step-dots"><div class="step-dot done"></div><div class="step-dot done"></div><div class="step-dot done"></div></div>
    <div class="success-wrap">
      <div class="success-badge">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
          <path d="M5 12l4 4L19 8" stroke="#4ADE80" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="step-title" style="margin-bottom:4px">Signal received</div>
      <div class="step-sub">Your identity has been verified.<br>Welcome to the network.</div>
      <div class="success-address">${addr.slice(0,8)}...${addr.slice(-6)}</div>
      <button class="btn btn-primary" onclick="enterApp()" style="margin-top:4px">
        Enter Semaphore →
      </button>
    </div>
  `,

  failed: (addr, code) => `
    <div class="step-dots"><div class="step-dot done"></div><div class="step-dot done"></div><div class="step-dot done"></div></div>
    <div class="step-label">Access denied</div>
    <div class="step-title">Code not recognized</div>
    <div class="step-sub">The invite code <strong style="color:var(--red);font-family:monospace">${code}</strong> is invalid,<br>expired, or has already been used.</div>
    <div class="feedback err" style="display:flex;margin-bottom:0">
      <span class="feedback-icon">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
          <circle cx="8" cy="8" r="7" stroke="#EF4444" stroke-width="1.2"/>
          <path d="M8 5v4M8 11v.5" stroke="#EF4444" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </span>
      <div>Each invite code is single-use and wallet-bound. If you received this code from a member, it may have expired. Codes are valid for 72 hours.</div>
    </div>
    <div class="actions" style="margin-top:20px">
      <button class="btn btn-primary" onclick="render('invite', currentWallet)">Try another code</button>
      <button class="btn btn-ghost" onclick="showRequestFlow()">Request a new invite</button>
      <button class="btn btn-ghost" onclick="render('connect')">← Disconnect & restart</button>
    </div>
  `,

  request: () => `
    <div class="step-label">Invite Request</div>
    <div class="step-title">Request access</div>
    <div class="step-sub">Send a signal to existing members.<br>They can grant you entry from their Invites panel.</div>
    <div style="display:flex;flex-direction:column;gap:12px">
      <textarea id="req-msg" placeholder="Why do you want to join Semaphore? (optional)"
        style="width:100%;padding:12px 14px;background:var(--raised);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:inherit;font-size:12px;resize:none;height:90px;outline:none;line-height:1.6"></textarea>
      <button class="btn btn-primary" onclick="submitRequest()">
        Broadcast request signal
      </button>
      <button class="btn btn-ghost" onclick="render('invite', currentWallet)">← Back to code entry</button>
    </div>
  `,

  requested: () => `
    <div class="success-wrap">
      <div class="success-badge" style="background:var(--violet-bg);border-color:var(--violet-border)">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="#9B7FD4">
          <path d="M12 2L9.5 9.5L2 12L9.5 14.5L12 22L14.5 14.5L22 12L14.5 9.5L12 2Z" opacity=".9"/>
        </svg>
      </div>
      <div class="step-title" style="margin-bottom:4px">Signal broadcast</div>
      <div class="step-sub">Your access request has been written to the network. Members can see it in their Invites panel. You'll receive a code when approved.</div>
      <button class="btn btn-ghost btn-sm" onclick="render('invite', currentWallet)" style="margin-top:4px">I have a code →</button>
    </div>
  `
};

function render(view, arg1, arg2) {
  document.getElementById('content').innerHTML = views[view](arg1, arg2) || '';
  const inp = document.getElementById('code-input');
  if (inp) inp.focus();
}

function selectWallet(name, addr) {
  currentWallet = addr;
  render('signing', name, addr);
  setTimeout(() => {
    render('invite', addr);
  }, 2200);
}

function handleInput(el) {
  el.classList.remove('err','ok');
  document.getElementById('feedback') && (document.getElementById('feedback').className = 'feedback');
  let v = el.value.replace(/[^A-Za-z0-9]/g,'').toUpperCase();
  if (v.length > 4) v = v.slice(0,4) + '-' + v.slice(4,8);
  el.value = v;
}

function submitCode() {
  const el = document.getElementById('code-input');
  if (!el) return;
  const code = el.value.trim().toUpperCase();
  if (!code) { el.focus(); return; }
  const valid = VALID_CODES.includes(code);
  el.classList.add(valid ? 'ok' : 'err');
  if (valid) {
    setTimeout(() => render('verifying'), 400);
    animateVerify(() => render('success', currentWallet));
  } else {
    attempts++;
    const fb = document.getElementById('feedback');
    fb.className = 'feedback err';
    fb.innerHTML = `<span class="feedback-icon"><svg width="14" height="14" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="7" stroke="#EF4444" stroke-width="1.2"/><path d="M8 5v4M8 11v.5" stroke="#EF4444" stroke-width="1.5" stroke-linecap="round"/></svg></span>
    <div>${attempts >= 3
      ? 'Too many failed attempts. Contact an existing member for a valid code.'
      : 'Invalid or expired code. Check the code and try again.'}</div>`;
    setTimeout(() => {
      el.classList.remove('err');
      el.value = '';
      el.focus();
    }, 900);
  }
}

const verifySteps = [
  [15, 'Connecting to node...'],
  [35, 'Fetching invite registry...'],
  [55, 'Checking code hash...'],
  [72, 'Verifying wallet binding...'],
  [88, 'Checking expiry timestamp...'],
  [100, 'Access confirmed.']
];

function animateVerify(onDone) {
  let i = 0;
  function step() {
    if (i >= verifySteps.length) { setTimeout(onDone, 300); return; }
    const [pct, msg] = verifySteps[i++];
    const bar = document.getElementById('vbar');
    const status = document.getElementById('vstatus');
    if (bar) bar.style.width = pct + '%';
    if (status) status.textContent = msg;
    setTimeout(step, 320 + Math.random() * 160);
  }
  setTimeout(step, 100);
}

function showRequestFlow() { render('request'); }
function submitRequest() { render('requested'); }
function enterApp() {
  sendPrompt('身份验证成功，已连接钱包地址 ' + currentWallet + '，请继续展示 Semaphore 的主页 Feed 组件');
}

render('connect');
</script>
